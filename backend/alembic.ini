# Alembic configuration for Strikfin.
#
# The database URL is intentionally NOT set here — env.py pulls it from
# app.core.config.settings.DATABASE_URL so credentials live only in backend/.env.
# Run migrations from the backend/ folder with the uv-managed env, e.g.:
#     uv run alembic revision --autogenerate -m "message"
#     uv run alembic upgrade head
#     uv run alembic stamp head        # mark an existing DB as up-to-date

[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
